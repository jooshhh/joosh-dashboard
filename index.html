<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Portfolio Dashboard</title>
</head>
<body>
    <header>
        <h1>Your Portfolio Dashboard</h1>
    </header>
    <main>
        <section id="price-tracking">
            <h2>Price Tracking</h2>
            <div id="prices">
                <!-- Price tracking will be displayed here -->
            </div>
        </section>

        <section id="holdings-management">
            <h2>Holdings Management</h2>
            <table id="holdings-table">
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th>Quantity</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Holdings will be listed here -->
                </tbody>
            </table>
        </section>

        <section id="milestone-tracking">
            <h2>Milestone Tracking</h2>
            <ul id="milestone-list">
                <!-- Milestones will be listed here -->
            </ul>
        </section>

        <section id="post-generation">
            <h2>Post Generation</h2>
            <form id="post-form">
                <textarea id="post-content" placeholder="What do you want to share?"></textarea>
                <button type="submit">Generate Post</button>
            </form>
            <div id="post-output">
                <!-- Generated posts will appear here -->
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
